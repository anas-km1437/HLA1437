<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Anas Chat Pro</title>
    <style>
        body { margin:0; background:#0b141a; color:#e9edef; font-family:Arial; height:100vh; display:flex; flex-direction:column; }
        #login { position:absolute; inset:0; background:#0b141a; display:flex; justify-content:center; align-items:center; z-index:100; gap:20px; flex-wrap:wrap; }
        .card { background:#202c33; padding:20px; border-radius:10px; width:280px; }
        input, button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:5px; box-sizing:border-box; }
        input { background:#2a3942; color:white; }
        button { background:#00a884; color:white; cursor:pointer; font-weight:bold; }
        
        #messages { flex:1; overflow:auto; padding:20px; list-style:none; display:flex; flex-direction:column; gap:8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-opacity:0.06; }
        .message-item { max-width:70%; padding:8px 12px; border-radius:10px; font-size:15px; position:relative; cursor:pointer; }
        .my-message { align-self:flex-end; background:#005c4b; }
        .other-message { align-self:flex-start; background:#202c33; }
        .meta { font-size:11px; color:#8696a0; display:flex; justify-content:space-between; margin-bottom:4px; gap:10px;}
        .user-label { color:#ffbc38; font-weight:bold; }
        
        .reply-area { background:rgba(0,0,0,0.2); border-right:3px solid #00a884; padding:4px; margin-bottom:5px; border-radius:4px; font-size:13px; color:#d1d7db; }
        #reply-bar { background:#202c33; padding:10px; display:none; border-bottom:1px solid #2a3942; justify-content:space-between; }
        
        img, video { max-width:100%; border-radius:8px; margin-top:5px; }
        audio { height:35px; width:200px; margin-top:5px; }
        
        .input-bar { display:flex; gap:10px; padding:10px; background:#202c33; align-items:center; }
        #msg { flex:1; border-radius:20px; padding:10px 15px; }
        .icon { font-size:20px; cursor:pointer; color:#8696a0; }
        .recording { color:#f44336; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="login">
    <div class="card">
        <h3>إنشاء غرفة</h3>
        <input id="newRoom" placeholder="اسم الغرفة">
        <input id="newPass" type="password" placeholder="كلمة السر">
        <button onclick="createRoom()">إنشاء</button>
    </div>
    <div class="card">
        <h3>دخول</h3>
        <input id="username" placeholder="اسمك">
        <input id="room" placeholder="اسم الغرفة">
        <input id="password" type="password" placeholder="كلمة السر">
        <button onclick="joinRoom()">دخول</button>
    </div>
</div>

<ul id="messages"></ul>

<div id="reply-bar">
    <span id="reply-text"></span>
    <span onclick="cancelReply()" style="cursor:pointer">✕</span>
</div>

<div class="input-bar">
    <label for="file" class="icon">📎</label>
    <input type="file" id="file" hidden onchange="sendFile()">
    <input id="msg" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter')sendMessage()">
    <span id="mic" class="icon" onclick="toggleMic()">🎤</span>
    <button onclick="sendMessage()" style="width:auto; border-radius:50%; width:40px; height:40px;">➤</button>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
const socket = io();
let username = "", currentRoom = "", currentReply = null;
let mediaRecorder, audioChunks = [];

function createRoom(){
    fetch("/create_room",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:document.getElementById("newRoom").value, password:document.getElementById("newPass").value})
    }).then(r=>r.json()).then(d=>alert(d.msg));
}

function joinRoom(){
    username = document.getElementById("username").value;
    currentRoom = document.getElementById("room").value;
    let pass = document.getElementById("password").value;
    if(!username || !currentRoom || !pass) return alert("اكمل البيانات");
    socket.emit("join",{username, room:currentRoom, password:pass});
}

socket.on("join_status", status => {
    if(status==='success') document.getElementById("login").style.display="none";
});

socket.on("error_msg", msg => alert(msg));

function sendMessage(){
    let msgInput = document.getElementById("msg");
    if(!msgInput.value.trim() && !currentReply) return;
    
    socket.emit("message",{
        username, room:currentRoom, 
        msg:msgInput.value, 
        reply_to: currentReply
    });
    msgInput.value="";
    cancelReply();
}

socket.on("message", data => {
    let li = document.createElement("li");
    li.className = "message-item " + (data.username === username ? "my-message" : "other-message");
    
    let html = `<div class="meta"><span class="user-label">${data.username}</span><span>${data.time}</span></div>`;
    
    if(data.reply_to) html += `<div class="reply-area">"${data.reply_to}"</div>`;
    
    if(data.file){
        if(data.file_type === 'image') html += `<img src="/static/uploads/${data.file}">`;
        else if(data.file_type === 'video') html += `<video controls src="/static/uploads/${data.file}"></video>`;
        else if(data.file_type === 'audio') html += `<audio controls src="/static/uploads/${data.file}"></audio>`;
    }
    
    if(data.msg) html += `<div>${data.msg}</div>`;
    
    li.innerHTML = html;
    li.onclick = () => setReply(data.msg || "ملف");
    document.getElementById("messages").appendChild(li);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
});

function setReply(txt){
    currentReply = txt;
    document.getElementById("reply-text").innerText = "الرد على: " + txt;
    document.getElementById("reply-bar").style.display = "flex";
}
function cancelReply(){
    currentReply = null;
    document.getElementById("reply-bar").style.display = "none";
}

async function sendFile(){
    let file=document.getElementById("file").files[0];
    if(!file) return;
    const chunkSize=1024*512;
    let offset=0, index=0;
    while(offset<file.size){
        let fd=new FormData();
        fd.append("chunk",file.slice(offset,offset+chunkSize));
        fd.append("filename",file.name);
        fd.append("index",index);
        await fetch("/upload_chunk",{method:"POST",body:fd});
        offset+=chunkSize; index++;
    }
    socket.emit("message",{username, room:currentRoom, file:file.name});
}

async function toggleMic(){
    const micBtn = document.getElementById("mic");
    if(!mediaRecorder || mediaRecorder.state === "inactive"){
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const filename = `voice_${Date.now()}.webm`;
            await uploadFile(blob, filename);
            socket.emit("message", {username, room:currentRoom, file:filename});
        };
        mediaRecorder.start();
        micBtn.classList.add("recording");
    } else {
        mediaRecorder.stop();
        micBtn.classList.remove("recording");
    }
}
async function uploadFile(blob, name){
    let fd = new FormData();
    fd.append("chunk", blob); fd.append("filename", name); fd.append("index", 0);
    await fetch("/upload_chunk", {method:"POST", body:fd});
}
</script>
</body>
</html>
