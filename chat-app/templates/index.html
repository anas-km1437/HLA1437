<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anas & Hanan</title>
    <style>
        :root { --bg: #0b141a; --header: #202c33; --accent: #00a884; --input: #2a3942; }
        body { margin:0; background: var(--bg); color:#e9edef; font-family: sans-serif; height: 100dvh; display:flex; flex-direction:column; overflow:hidden; }
        
        #login-screen { position:fixed; inset:0; background: var(--bg); display:flex; justify-content:center; align-items:center; z-index:1000; padding:20px; overflow-y:auto; flex-wrap:wrap; gap:20px; }
        .card { background: var(--header); padding:20px; border-radius:15px; width:100%; max-width:320px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, button { width:100%; padding:14px; margin:8px 0; border:none; border-radius:10px; font-size:16px; box-sizing:border-box; }
        input { background: var(--input); color:white; }
        button { background: var(--accent); color:white; font-weight:bold; cursor:pointer; }

        .chat-header { background: var(--header); padding:10px 15px; display:none; justify-content:space-between; align-items:center; border-bottom: 1px solid #313d45; }
        #messages { flex:1; overflow-y:auto; padding:15px; list-style:none; display:flex; flex-direction:column; gap:12px; margin:0; }
        .message-item { max-width:85%; padding:10px 14px; border-radius:12px; font-size:16px; color:white; position:relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .my-message { align-self:flex-end; background:#005c4b; border-top-left-radius:0; }
        .other-message { align-self:flex-start; background: var(--header); border-top-right-radius:0; }

        .input-area { background: var(--header); padding: 10px 10px calc(12px + env(safe-area-inset-bottom)); display:none; flex-direction:column; border-top: 1px solid #2a3942; }
        
        .input-bar { display:flex; gap:12px; align-items:center; width: 100%; }
        #msg { flex:1; border-radius:25px; padding:12px 18px; background: var(--input); color:white; border:none; font-size:16px; }
        .icon-btn { font-size:24px; cursor:pointer; color:#8696a0; }
        .mic-active { color: #ff4b4b !important; animation: pulse 1s infinite; }
        .send-btn { width:48px; height:48px; border-radius:50%; background: var(--accent); color:white; border:none; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }
        
        #audio-preview-bar { display:none; gap:10px; align-items:center; width: 100%; background: var(--input); padding: 5px 10px; border-radius: 25px; box-sizing: border-box; }
        #preview-player { flex:1; height: 35px; }
        .action-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: white; font-size: 18px; flex-shrink:0; margin:0;}
        .btn-send-audio { background: var(--accent); }
        .btn-cancel-audio { background: #ff4b4b; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #reply-bar { display:none; background: rgba(0,0,0,0.2); padding:8px; border-radius:8px; margin-bottom:8px; border-right: 4px solid var(--accent); justify-content:space-between; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card"><h3>إنشاء غرفة</h3><input id="cName" placeholder="اسم الغرفة"><input id="cPass" type="password" placeholder="كلمة السر"><button onclick="createRoom()">إنشاء ✅</button></div>
    <div class="card"><h3>دخول</h3><input id="uLogin" placeholder="اسمك"><input id="rLogin" placeholder="الغرفة"><input id="pLogin" type="password" placeholder="كلمة السر"><button onclick="joinRoom()">دخول 🚀</button></div>
</div>

<div class="chat-header" id="chat-header"><div id="online-list" style="font-size:12px; color:var(--accent);"></div></div>
<ul id="messages"></ul>

<div class="input-area" id="input-area">
    <div id="reply-bar"><span id="reply-text"></span><span onclick="cancelReply()">✕</span></div>
    
    <div class="input-bar" id="main-input-bar">
        <label for="file" class="icon-btn">📎</label>
        <input type="file" id="file" hidden onchange="sendFile()">
        <span id="mic-btn" class="icon-btn" onclick="toggleMic()">🎤</span>
        <input id="msg" placeholder="رسالة..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <div id="audio-preview-bar">
        <button class="action-btn btn-cancel-audio" onclick="cancelAudio()">🗑️</button>
        <audio id="preview-player" controls></audio>
        <button class="action-btn btn-send-audio" onclick="sendPendingAudio()">✅</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const socket = io();
    let me, myRoom, myPass, myReply = null;
    let mediaRecorder, audioChunks = [];
    let pendingAudioBlob = null;

    async function createRoom() {
        const name=document.getElementById("cName").value; const pass=document.getElementById("cPass").value;
        if(!name || !pass) return;
        const res = await fetch("/create_room", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name, password:pass})});
        const d = await res.json(); alert(d.msg);
    }

    function joinRoom() {
        me=document.getElementById("uLogin").value; myRoom=document.getElementById("rLogin").value; myPass=document.getElementById("pLogin").value;
        if(!me || !myRoom) return;
        socket.emit("join", {username: me, room: myRoom, password: myPass});
    }

    socket.on("join_status", d => {
        if(d.status==='success'){
            document.getElementById("login-screen").style.display="none";
            document.getElementById("chat-header").style.display="flex";
            document.getElementById("input-area").style.display="flex";
            if(d.bg) document.getElementById("messages").style.background = `url('${d.bg}') center/cover fixed`;
        }
    });

    socket.on("message", d => {
        let li = document.createElement("li");
        li.className = "message-item " + (d.username === me ? "my-message" : "other-message");
        let html = `<div style="font-size:10px; color:#ffbc38; font-weight:bold;">${d.username} <span style="float:left; color:#8696a0;">${d.time}</span></div>`;
        if(d.reply_to) html += `<div style="background:rgba(0,0,0,0.1); padding:5px; margin:5px 0; font-size:12px;">${d.reply_to}</div>`;
        
        // --- المعالجة الشاملة للملفات والصوت والفيديو ---
        if(d.file) {
            if(d.file_type === 'image') {
                html += `<img src="/static/uploads/${d.file}" style="max-width:100%; border-radius:8px; margin-top:5px;">`;
            } else if(d.file_type === 'audio') {
                html += `<audio controls style="width:100%; margin-top:5px;"><source src="/static/uploads/${d.file}"></audio>`;
            } else if(d.file_type === 'video') {
                html += `<video controls style="max-width:100%; border-radius:8px; margin-top:5px;"><source src="/static/uploads/${d.file}"></video>`;
            } else {
                html += `<div style="margin-top:8px;"><a href="/static/uploads/${d.file}" target="_blank" style="color:white; text-decoration:underline; font-weight:bold;">📎 تحميل الملف</a></div>`;
            }
        }
        
        if(d.msg) html += `<div style="margin-top:5px;">${d.msg}</div>`;
        li.innerHTML = html;
        document.getElementById("messages").appendChild(li);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });

    async function toggleMic() {
        const btn = document.getElementById("mic-btn");
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                pendingAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(pendingAudioBlob);
                document.getElementById("preview-player").src = audioUrl;
                document.getElementById("main-input-bar").style.display = "none";
                document.getElementById("audio-preview-bar").style.display = "flex";
                btn.classList.remove("mic-active");
            };
            
            mediaRecorder.start();
            btn.classList.add("mic-active");
        } else {
            mediaRecorder.stop();
        }
    }

    async function sendPendingAudio() {
        if(!pendingAudioBlob) return;
        const fileName = `voice_${Date.now()}.webm`;
        let fd = new FormData(); fd.append("chunk", pendingAudioBlob); fd.append("filename", fileName); fd.append("index", 0);
        await fetch("/upload_chunk", { method: "POST", body: fd });
        socket.emit("message", { username: me, room: myRoom, file: fileName, reply_to: myReply });
        cancelAudio(); 
    }

    function cancelAudio() {
        pendingAudioBlob = null;
        document.getElementById("preview-player").src = "";
        document.getElementById("audio-preview-bar").style.display = "none";
        document.getElementById("main-input-bar").style.display = "flex";
    }

    function sendMessage() {
        const input = document.getElementById("msg");
        if(!input.value.trim()) return;
        socket.emit("message", {username: me, room: myRoom, msg: input.value, reply_to: myReply});
        input.value=""; cancelReply();
    }

    async function sendFile() {
        let fileInput = document.getElementById("file");
        let f = fileInput.files[0];
        if(!f) return;
        let fd = new FormData(); fd.append("chunk", f); fd.append("filename", f.name); fd.append("index", 0);
        await fetch("/upload_chunk", {method:"POST", body: fd});
        socket.emit("message", {username: me, room: myRoom, file: f.name, reply_to: myReply});
        fileInput.value = ""; // تفريغ الحقل لتتمكن من رفع نفس الملف مرة أخرى إذا أردت
    }

    function cancelReply() { myReply=null; document.getElementById("reply-bar").style.display="none"; }
    socket.on("update_users", u => document.getElementById("online-list").innerText = "متصل: " + u.join(", "));
</script>
</body>
</html>
