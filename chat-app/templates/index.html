<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Room</title>
    <style>
        :root { --bg-dark: #0b141a; --header-bg: #202c33; --accent: #00a884; --input-bg: #2a3942; }
        
        /* جعل الطول يتناسب مع طول الجوال الحقيقي */
        body { margin:0; background: var(--bg-dark); color:#e9edef; font-family: sans-serif; height: 100dvh; display:flex; flex-direction:column; overflow:hidden; }
        
        #login { position:fixed; inset:0; background: var(--bg-dark); display:flex; justify-content:center; align-items:center; z-index:1000; padding:20px; overflow-y:auto; }
        .card { background: var(--header-bg); padding:25px; border-radius:15px; width:100%; max-width:320px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        input, button { width:100%; padding:14px; margin:8px 0; border:none; border-radius:10px; font-size:16px; box-sizing:border-box; }
        input { background: var(--input-bg); color:white; border: 1px solid transparent; }
        input:focus { border-color: var(--accent); outline:none; }
        button { background: var(--accent); color:white; font-weight:bold; cursor:pointer; }

        .chat-header { background: var(--header-bg); padding:12px 15px; display:none; justify-content:space-between; align-items:center; z-index:10; border-bottom: 1px solid #313d45; }
        #online-list { font-size:14px; color: var(--accent); font-weight:bold; }

        /* منطقة الرسائل */
        #messages { flex:1; overflow-y:auto; padding:15px; list-style:none; display:flex; flex-direction:column; gap:12px; margin:0; background-color: var(--bg-dark); }
        .message-item { max-width:85%; padding:10px 14px; border-radius:12px; font-size:16px; color:white; word-wrap:break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .my-message { align-self:flex-end; background:#005c4b; border-top-left-radius: 0; }
        .other-message { align-self:flex-start; background: var(--header-bg); border-top-right-radius: 0; }

        /* شريط الرد */
        #reply-bar { display:none; background: var(--header-bg); padding:10px 15px; border-bottom: 1px solid var(--input-bg); justify-content:space-between; align-items:center; }

        /* منطقة الإدخال المطورة للنقال */
        .input-area { background: var(--header-bg); padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 10px rgba(0,0,0,0.2); display:none; flex-direction:column; }
        .input-bar { display:flex; gap:10px; align-items:center; }
        #msg { flex:1; border-radius:25px; padding:12px 18px; background: var(--input-bg); color:white; border:none; font-size:16px; }
        
        .icon-btn { font-size:24px; cursor:pointer; color:#8696a0; width:40px; text-align:center; }
        .send-btn { width:48px; height:48px; border-radius:50%; background: var(--accent); color:white; border:none; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }

        #settings-modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:2000; padding:20px; }
    </style>
</head>
<body>

<div id="login">
    <div class="card">
        <h3 style="text-align:center; color:var(--accent);">دخول الغرفة</h3>
        <input id="username" placeholder="اسمك">
        <input id="room" placeholder="اسم الغرفة">
        <input id="password" type="password" placeholder="كلمة السر">
        <button onclick="joinRoom()">دخول</button>
        <hr style="border:0; border-top:1px solid #313d45; margin:15px 0;">
        <button style="background:#3b4a54;" onclick="document.getElementById('create-area').style.display='block'">إنشاء غرفة جديدة</button>
        <div id="create-area" style="display:none; margin-top:10px;">
            <input id="newRoom" placeholder="اسم الغرفة الجديدة">
            <input id="newPass" type="password" placeholder="سر الغرفة">
            <input id="newBg" placeholder="رابط الخلفية">
            <button onclick="createRoom()">تأكيد الإنشاء</button>
        </div>
    </div>
</div>

<div class="chat-header" id="chat-header">
    <div id="online-list">متصل...</div>
    <div onclick="openSettings()" style="cursor:pointer; font-size:20px;">⚙️</div>
</div>

<div id="settings-modal"><div class="card"><h3>تحديث الخلفية</h3><input id="updateBgInput" placeholder="رابط الصورة المباشر"><button onclick="saveSettings()">تحديث</button><button onclick="closeSettings()" style="background:#3b4a54">إلغلاق</button></div></div>

<ul id="messages"></ul>

<!-- منطقة الإدخال الكاملة -->
<div class="input-area" id="input-area">
    <div id="reply-bar">
        <span id="reply-text" style="font-size:13px; color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
        <span onclick="cancelReply()" style="cursor:pointer; padding:5px;">✕</span>
    </div>
    <div class="input-bar">
        <label for="file" class="icon-btn">📎</label>
        <input type="file" id="file" hidden onchange="sendFile()">
        <input id="msg" placeholder="اكتب رسالة..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const socket = io();
    let username, currentRoom, currentPass, currentReply = null;

    function createRoom(){
        const name=document.getElementById("newRoom").value;
        const pass=document.getElementById("newPass").value;
        const bg=document.getElementById("newBg").value;
        fetch("/create_room",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name, password:pass, background:bg})}).then(r=>r.json()).then(d=>alert(d.msg));
    }

    function joinRoom(){
        username=document.getElementById("username").value; currentRoom=document.getElementById("room").value; currentPass=document.getElementById("password").value;
        if(!username || !currentRoom) return alert("أكمل البيانات");
        socket.emit("join",{username, room:currentRoom, password:currentPass});
    }

    socket.on("join_status", d => {
        if(d.status==='success'){
            document.getElementById("login").style.display="none";
            document.getElementById("chat-header").style.display="flex";
            document.getElementById("input-area").style.display="flex";
            if(d.bg) applyBackground(d.bg);
        }
    });

    socket.on("error_msg", m => alert(m));

    function applyBackground(url){
        const msgBox = document.getElementById("messages");
        msgBox.style.backgroundImage = `url('${url}')`;
        msgBox.style.backgroundSize = "cover";
        msgBox.style.backgroundPosition = "center top";
        msgBox.style.backgroundAttachment = "fixed";
    }

    socket.on("message", d => {
        let li = document.createElement("li");
        li.className = "message-item " + (d.username === username ? "my-message" : "other-message");
        let html = `<div style="font-size:11px; opacity:0.8; margin-bottom:4px; font-weight:bold;">${d.username} <span style="float:left; font-weight:normal;">${d.time}</span></div>`;
        if(d.reply_to) html += `<div style="background:rgba(0,0,0,0.1); border-right:3px solid var(--accent); padding:5px; margin-bottom:5px; font-size:13px;">${d.reply_to}</div>`;
        if(d.file) {
            if(d.file_type==='image') html += `<img src="/static/uploads/${d.file}" style="max-width:100%; border-radius:8px;">`;
            else html += `<div style="padding:10px; background:rgba(255,255,255,0.1); border-radius:8px;">📁 ملف مرفق</div>`;
        }
        if(d.msg) html += `<div>${d.msg}</div>`;
        li.innerHTML = html;
        li.onclick = () => { currentReply=d.msg; document.getElementById("reply-bar").style.display="flex"; document.getElementById("reply-text").innerText=d.msg; };
        document.getElementById("messages").appendChild(li);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });

    function sendMessage(){
        let m = document.getElementById("msg");
        if(!m.value.trim() && !currentReply) return;
        socket.emit("message",{username, room:currentRoom, msg:m.value, reply_to:currentReply});
        m.value=""; cancelReply();
    }

    function cancelReply(){ currentReply=null; document.getElementById("reply-bar").style.display="none"; }
    function openSettings(){ document.getElementById("settings-modal").style.display="flex"; }
    function closeSettings(){ document.getElementById("settings-modal").style.display="none"; }
    
    function saveSettings(){
        fetch("/update_bg",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({room:currentRoom, password:currentPass, bg_url:document.getElementById("updateBgInput").value})}).then(r=>r.json()).then(d=>{alert(d.msg); closeSettings();});
    }

    // إرسال الملفات بشكل مبسط
    async function sendFile(){
        let file=document.getElementById("file").files[0];
        if(!file) return;
        let fd=new FormData(); fd.append("chunk", file); fd.append("filename", file.name); fd.append("index", 0);
        await fetch("/upload_chunk",{method:"POST", body:fd});
        socket.emit("message",{username, room:currentRoom, file:file.name, reply_to:currentReply});
        cancelReply();
    }
</script>
</body>
</html>
