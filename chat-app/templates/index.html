<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Anas Chat 1437</title>
    <style>
        body { margin:0; background:#0b141a; color:#e9edef; font-family:Arial; height:100vh; display:flex; flex-direction:column; }
        #login { position:fixed; inset:0; background:#0b141a; display:flex; justify-content:center; align-items:center; z-index:1000; gap:20px; flex-wrap:wrap; }
        .card { background:#202c33; padding:20px; border-radius:10px; width:280px; }
        input, button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:5px; box-sizing:border-box; }
        input { background:#2a3942; color:white; }
        button { background:#00a884; color:white; cursor:pointer; font-weight:bold; }
        
        #messages { flex:1; overflow:auto; padding:20px; list-style:none; display:flex; flex-direction:column; gap:8px; background-color:#0b141a; }
        
        /* خلفية خاصة لغرفة 1437 */
        .bg-1437 { 
            background-image: url('/static/download.jpg') !important; 
            background-size: cover !important; 
            background-position: center !important;
        }

        .message-item { max-width:70%; padding:8px 12px; border-radius:10px; position:relative; cursor:pointer; }
        .my-message { align-self:flex-end; background:#005c4b; }
        .other-message { align-self:flex-start; background:#202c33; }
        
        /* شريط التحميل */
        #progress-container { width:100%; background:#2a3942; display:none; height:5px; }
        #progress-bar { width:0%; height:100%; background:#00a884; transition:0.2s; }

        /* معاينة الصوت */
        #voice-preview { display:none; background:#202c33; padding:10px; align-items:center; gap:10px; border-top:1px solid #2a3942; }
        
        .input-bar { display:flex; gap:10px; padding:10px; background:#202c33; align-items:center; }
        #msg { flex:1; border-radius:20px; padding:10px 15px; background:#2a3942; color:white; border:none; }
        .icon { font-size:20px; cursor:pointer; color:#8696a0; }
        .recording { color:#f44336; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="login">
    <div class="card">
        <h3>إنشاء غرفة</h3>
        <input id="newRoom" placeholder="اسم الغرفة">
        <input id="newPass" type="password" placeholder="كلمة السر">
        <button onclick="createRoom()">إنشاء</button>
    </div>
    <div class="card">
        <h3>دخول</h3>
        <input id="username" placeholder="اسمك">
        <input id="room" placeholder="اسم الغرفة">
        <input id="password" type="password" placeholder="كلمة السر">
        <button onclick="joinRoom()">دخول</button>
    </div>
</div>

<div id="progress-container"><div id="progress-bar"></div></div>
<ul id="messages"></ul>

<div id="voice-preview">
    <audio id="preview-player" controls style="flex:1"></audio>
    <button onclick="sendVoice()" style="width:auto; padding:5px 15px;">إرسال</button>
    <button onclick="cancelVoice()" style="width:auto; padding:5px 15px; background:#f44336;">حذف</button>
</div>

<div class="input-bar">
    <label for="file" class="icon">📎</label>
    <input type="file" id="file" hidden onchange="sendFile()">
    <input id="msg" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter')sendMessage()">
    <span id="mic" class="icon" onclick="toggleMic()">🎤</span>
    <button onclick="sendMessage()" style="width:40px; border-radius:50%;">➤</button>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const socket = io();
    let username = "", currentRoom = "", recordedBlob = null;
    let mediaRecorder, audioChunks = [];

    function createRoom(){
        fetch("/create_room",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name:document.getElementById("newRoom").value, password:document.getElementById("newPass").value})
        }).then(r=>r.json()).then(d=>alert(d.msg));
    }

    function joinRoom(){
        username = document.getElementById("username").value;
        currentRoom = document.getElementById("room").value;
        socket.emit("join",{username, room:currentRoom, password:document.getElementById("password").value});
    }

    socket.on("join_status", status => {
        if(status==='success') {
            document.getElementById("login").style.display="none";
            if(currentRoom === "1437") document.getElementById("messages").classList.add("bg-1437");
        }
    });

    socket.on("message", data => {
        let li = document.createElement("li");
        li.className = "message-item " + (data.username === username ? "my-message" : "other-message");
        let content = `<div style="font-size:11px; color:#8696a0;">${data.username} • ${data.time}</div>`;
        if(data.file){
            if(data.file_type==='image') content += `<img src="/static/uploads/${data.file}" style="max-width:100%; border-radius:5px;">`;
            else if(data.file_type==='video') content += `<video controls src="/static/uploads/${data.file}" style="max-width:100%; border-radius:5px;"></video>`;
            else if(data.file_type==='audio') content += `<audio controls src="/static/uploads/${data.file}"></audio>`;
        }
        if(data.msg) content += `<div>${data.msg}</div>`;
        li.innerHTML = content;
        document.getElementById("messages").appendChild(li);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });

    async function sendFile(){
        let file=document.getElementById("file").files[0];
        if(!file) return;
        document.getElementById("progress-container").style.display="block";
        const chunkSize=1024*512;
        let offset=0, index=0;
        while(offset < file.size){
            let fd=new FormData();
            fd.append("chunk", file.slice(offset, offset + chunkSize));
            fd.append("filename", file.name);
            fd.append("index", index);
            await fetch("/upload_chunk",{method:"POST", body:fd});
            offset+=chunkSize; index++;
            document.getElementById("progress-bar").style.width = Math.min((offset/file.size)*100, 100) + "%";
        }
        socket.emit("message",{username, room:currentRoom, file:file.name});
        setTimeout(()=> document.getElementById("progress-container").style.display="none", 1000);
    }

    async function toggleMic(){
        if(!mediaRecorder || mediaRecorder.state === "inactive"){
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                document.getElementById("preview-player").src = URL.createObjectURL(recordedBlob);
                document.getElementById("voice-preview").style.display = "flex";
            };
            mediaRecorder.start();
            document.getElementById("mic").classList.add("recording");
        } else {
            mediaRecorder.stop();
            document.getElementById("mic").classList.remove("recording");
        }
    }

    async function sendVoice(){
        let fname = `voice_${Date.now()}.webm`;
        let fd=new FormData(); fd.append("chunk", recordedBlob); fd.append("filename", fname); fd.append("index", 0);
        await fetch("/upload_chunk",{method:"POST", body:fd});
        socket.emit("message",{username, room:currentRoom, file:fname});
        cancelVoice();
    }

    function cancelVoice(){
        document.getElementById("voice-preview").style.display="none";
        recordedBlob = null;
    }

    function sendMessage(){
        let msg = document.getElementById("msg");
        if(!msg.value.trim()) return;
        socket.emit("message",{username, room:currentRoom, msg:msg.value});
        msg.value="";
    }
</script>
</body>
</html>
