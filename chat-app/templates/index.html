<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Room Pro</title>
    <style>
        :root { --bg-dark: #0b141a; --header-bg: #202c33; --accent: #00a884; --input-bg: #2a3942; }
        body { margin:0; background: var(--bg-dark); color:#e9edef; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100dvh; display:flex; flex-direction:column; overflow:hidden; }
        
        /* شاشة الدخول والإنشاء */
        #login-screen { position:fixed; inset:0; background: var(--bg-dark); display:flex; justify-content:center; align-items:center; z-index:1000; padding:20px; overflow-y:auto; flex-wrap:wrap; gap:20px; }
        .card { background: var(--header-bg); padding:20px; border-radius:15px; width:100%; max-width:320px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h3 { text-align:center; color: var(--accent); margin-top:0; margin-bottom:15px; }
        input, button { width:100%; padding:14px; margin:8px 0; border:none; border-radius:10px; font-size:16px; box-sizing:border-box; }
        input { background: var(--input-bg); color:white; }
        button { background: var(--accent); color:white; font-weight:bold; cursor:pointer; }

        /* الهيدر */
        .chat-header { background: var(--header-bg); padding:12px 15px; display:none; justify-content:space-between; align-items:center; z-index:10; border-bottom: 1px solid #313d45; }
        #online-list { font-size:13px; color: var(--accent); font-weight:bold; }

        /* منطقة الرسائل */
        #messages { flex:1; overflow-y:auto; padding:15px; list-style:none; display:flex; flex-direction:column; gap:12px; margin:0; background-color: var(--bg-dark); }
        .message-item { max-width:85%; padding:10px 14px; border-radius:12px; font-size:16px; color:white; word-wrap:break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .my-message { align-self:flex-end; background:#005c4b; border-top-left-radius: 0; }
        .other-message { align-self:flex-start; background: var(--header-bg); border-top-right-radius: 0; }

        /* منطقة الإدخال */
        .input-area { background: var(--header-bg); padding: 10px 10px calc(12px + env(safe-area-inset-bottom)); display:none; flex-direction:column; border-top:1px solid #2a3942; }
        .input-bar { display:flex; gap:10px; align-items:center; }
        #msg { flex:1; border-radius:25px; padding:12px 18px; background: var(--input-bg); color:white; border:none; font-size:16px; }
        .icon-btn { font-size:24px; cursor:pointer; color:#8696a0; }
        .send-btn { width:48px; height:48px; border-radius:50%; background: var(--accent); color:white; border:none; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }

        /* شريط الرد */
        #reply-bar { display:none; background: rgba(0,0,0,0.2); padding:8px 12px; border-radius:8px; margin-bottom:8px; justify-content:space-between; align-items:center; border-right:4px solid var(--accent); }

        #settings-modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:2000; padding:20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <!-- كرت إنشاء الغرفة -->
    <div class="card">
        <h3>إنشاء غرفة جديدة</h3>
        <input id="createName" placeholder="اسم الغرفة">
        <input id="createPass" type="password" placeholder="كلمة سر الغرفة">
        <input id="createBg" placeholder="رابط الخلفية (اختياري)">
        <button onclick="handleCreateRoom()">تأكيد الإنشاء ✅</button>
    </div>

    <!-- كرت الدخول -->
    <div class="card">
        <h3>دخول للدردشة</h3>
        <input id="userLogin" placeholder="اسمك المستعار">
        <input id="roomLogin" placeholder="اسم الغرفة">
        <input id="passLogin" type="password" placeholder="كلمة السر">
        <button onclick="handleJoinRoom()">دخول الآن 🚀</button>
    </div>
</div>

<div class="chat-header" id="chat-header">
    <div id="online-list">متصل...</div>
    <div onclick="openSettings()" style="cursor:pointer; font-size:22px;">⚙️</div>
</div>

<ul id="messages"></ul>

<div class="input-area" id="input-area">
    <div id="reply-bar">
        <span id="reply-text" style="font-size:13px; color:var(--accent);"></span>
        <span onclick="cancelReply()" style="cursor:pointer; padding:0 5px; color:#8696a0;">✕</span>
    </div>
    <div class="input-bar">
        <label for="file" class="icon-btn">📎</label>
        <input type="file" id="file" hidden onchange="sendFile()">
        <input id="msg" placeholder="اكتب رسالة..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<div id="settings-modal"><div class="card"><h3>تحديث الخلفية</h3><input id="updateBgInput" placeholder="رابط الصورة المباشر"><button onclick="saveSettings()">تحديث</button><button onclick="closeSettings()" style="background:#3b4a54">إغلاق</button></div></div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const socket = io();
    let currentUsername, currentRoom, currentPass, currentReply = null;

    // دالة إنشاء الغرفة المصلحة والمطورة
    async function handleCreateRoom() {
        const name = document.getElementById("createName").value.trim();
        const password = document.getElementById("createPass").value.trim();
        const background = document.getElementById("createBg").value.trim();

        if (!name || !password) return alert("يرجى إدخال اسم الغرفة وكلمة السر!");

        try {
            const response = await fetch("/create_room", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, password, background })
            });
            const data = await response.json();
            alert(data.msg);
            if (data.status === "success") {
                // تصفير الحقول بعد النجاح
                document.getElementById("createName").value = "";
                document.getElementById("createPass").value = "";
                document.getElementById("createBg").value = "";
            }
        } catch (error) {
            console.error("Error:", error);
            alert("فشل الاتصال بالسيرفر، تأكد من تشغيل app.py");
        }
    }

    function handleJoinRoom() {
        currentUsername = document.getElementById("userLogin").value.trim();
        currentRoom = document.getElementById("roomLogin").value.trim();
        currentPass = document.getElementById("passLogin").value.trim();
        if (!currentUsername || !currentRoom) return alert("أكمل البيانات");
        socket.emit("join", { username: currentUsername, room: currentRoom, password: currentPass });
    }

    socket.on("join_status", d => {
        if (d.status === 'success') {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("chat-header").style.display = "flex";
            document.getElementById("input-area").style.display = "flex";
            if (d.bg) applyBackground(d.bg);
        }
    });

    socket.on("error_msg", m => alert(m));
    socket.on("update_users", users => { document.getElementById("online-list").innerText = "المتواجدون: " + users.join(" ، "); });
    socket.on("bg_updated", bgUrl => applyBackground(bgUrl));

    function applyBackground(url) {
        const msgBox = document.getElementById("messages");
        msgBox.style.backgroundImage = `url('${url}')`;
        msgBox.style.backgroundSize = "cover";
        msgBox.style.backgroundPosition = "center top";
        msgBox.style.backgroundAttachment = "fixed";
    }

    socket.on("message", d => {
        let li = document.createElement("li");
        li.className = "message-item " + (d.username === currentUsername ? "my-message" : "other-message");
        let html = `<div style="font-size:11px; opacity:0.8; margin-bottom:4px; font-weight:bold; color:#ffbc38;">${d.username} <span style="float:left; font-weight:normal; color:#8696a0;">${d.time}</span></div>`;
        if (d.reply_to) html += `<div style="background:rgba(0,0,0,0.15); border-right:3px solid var(--accent); padding:5px; margin-bottom:5px; font-size:13px; border-radius:4px;">${d.reply_to}</div>`;
        if (d.file) {
            if (d.file_type === 'image') html += `<img src="/static/uploads/${d.file}" style="max-width:100%; border-radius:8px; display:block;">`;
            else html += `<div style="padding:10px; background:rgba(255,255,255,0.05); border-radius:8px;">📁 ملف مرفق</div>`;
        }
        if (d.msg) html += `<div>${d.msg}</div>`;
        li.innerHTML = html;
        li.onclick = () => { currentReply = d.msg; document.getElementById("reply-bar").style.display = "flex"; document.getElementById("reply-text").innerText = d.msg; document.getElementById("msg").focus(); };
        document.getElementById("messages").appendChild(li);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });

    function sendMessage() {
        let m = document.getElementById("msg");
        if (!m.value.trim() && !currentReply) return;
        socket.emit("message", { username: currentUsername, room: currentRoom, msg: m.value, reply_to: currentReply });
        m.value = ""; cancelReply();
    }

    function cancelReply() { currentReply = null; document.getElementById("reply-bar").style.display = "none"; }
    function openSettings() { document.getElementById("settings-modal").style.display = "flex"; }
    function closeSettings() { document.getElementById("settings-modal").style.display = "none"; }

    function saveSettings() {
        fetch("/update_bg", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ room: currentRoom, password: currentPass, bg_url: document.getElementById("updateBgInput").value }) }).then(r => r.json()).then(d => { alert(d.msg); closeSettings(); });
    }

    async function sendFile() {
        let file = document.getElementById("file").files[0];
        if (!file) return;
        let fd = new FormData(); fd.append("chunk", file); fd.append("filename", file.name); fd.append("index", 0);
        await fetch("/upload_chunk", { method: "POST", body: fd });
        socket.emit("message", { username: currentUsername, room: currentRoom, file: file.name, reply_to: currentReply });
        cancelReply();
    }
</script>
</body>
</html>
