<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Room Pro - Fixed Play</title>
    <style>
        :root { --bg: #0b141a; --header: #202c33; --accent: #00a884; --input: #2a3942; }
        body { margin:0; background: var(--bg); color:#e9edef; font-family: sans-serif; height: 100dvh; display:flex; flex-direction:column; overflow:hidden; }
        
        #login-screen { position:fixed; inset:0; background: var(--bg); display:flex; justify-content:center; align-items:center; z-index:1000; padding:20px; overflow-y:auto; flex-wrap:wrap; gap:20px; }
        .card { background: var(--header); padding:20px; border-radius:15px; width:100%; max-width:320px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, button { width:100%; padding:14px; margin:8px 0; border:none; border-radius:10px; font-size:16px; box-sizing:border-box; }
        input { background: var(--input); color:white; }
        button { background: var(--accent); color:white; font-weight:bold; cursor:pointer; }

        .chat-header { background: var(--header); padding:10px 15px; display:none; justify-content:space-between; align-items:center; border-bottom: 1px solid #313d45; }
        #online-list { font-size:12px; color: var(--accent); font-weight:bold; }

        #messages { flex:1; overflow-y:auto; padding:15px; list-style:none; display:flex; flex-direction:column; gap:12px; margin:0; }
        .message-item { max-width:85%; padding:10px 14px; border-radius:12px; font-size:16px; color:white; word-wrap:break-word; position:relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .my-message { align-self:flex-end; background:#005c4b; border-top-left-radius: 0; }
        .other-message { align-self:flex-start; background: var(--header); border-top-right-radius: 0; }

        /* --- الإصلاح الجذري لمشغلات الصوت والفيديو --- */
        .msg-audio, .msg-video { 
            width: 100%;       /* ملء الرسالة */
            max-width: 100%;  /* منع التمدد اللا محدود */
            display: block;   /* منع المسافات الغريبة تحت العنصر */
            border-radius: 8px; 
            margin-top: 8px;   /* مسافة فوق المشغل */
            outline: none;     /* إزالة الإطار المحيط عند النقر */
            background: #ffffff; /* لون خلفية خفيف لضمان وضوح الأزرار */
        }
        .msg-audio { 
            height: 45px;      /* طول مثالي لتظهر أزرار التشغيل كاملة */
        }
        .msg-video { 
            background: transparent; /* خلفية شفافة للفيديو */
            max-height: 250px; /* طول أقصى للفيديو في الشات */
        }

        .input-area { background: var(--header); padding: 10px 10px calc(12px + env(safe-area-inset-bottom)); display:none; flex-direction:column; border-top: 1px solid #2a3942; }
        .input-bar { display:flex; gap:12px; align-items:center; width: 100%; }
        #msg { flex:1; border-radius:25px; padding:12px 18px; background: var(--input); color:white; border:none; font-size:16px; }
        
        .icon-btn { font-size:24px; cursor:pointer; color:#8696a0; }
        .mic-active { color: #ff4b4b !important; animation: pulse 1s infinite; }
        .send-btn { width:48px; height:48px; border-radius:50%; background: var(--accent); color:white; border:none; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }

        #audio-preview-bar { display:none; gap:10px; align-items:center; width: 100%; background: var(--input); padding: 5px 10px; border-radius: 25px; box-sizing: border-box; }
        #preview-player { flex:1; height: 35px; }
        .action-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: white; font-size: 18px; flex-shrink:0;}
        .btn-send-audio { background: var(--accent); }
        .btn-cancel-audio { background: #ff4b4b; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #reply-bar { display:none; background: rgba(0,0,0,0.2); padding:8px; border-radius:8px; margin-bottom:8px; border-right: 4px solid var(--accent); justify-content:space-between; }
        #settings-modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:2000; padding:20px; }
        
        @media (max-width: 600px) {
            .msg-audio { width: 100%; } /* للجوال */
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card"><h3>إنشاء غرفة</h3><input id="cName" placeholder="اسم الغرفة"><input id="cPass" type="password" placeholder="كلمة السر"><input id="cBg" placeholder="رابط الخلفية (اختياري)"><button onclick="createRoom()">إنشاء ✅</button></div>
    <div class="card"><h3>دخول</h3><input id="uLogin" placeholder="اسمك المستعار"><input id="rLogin" placeholder="اسم الغرفة"><input id="pLogin" type="password" placeholder="كلمة السر"><button onclick="joinRoom()">دخول 🚀</button></div>
</div>

<div class="chat-header" id="chat-header">
    <div id="online-list">جاري التحميل...</div>
    <div onclick="openSettings()" style="cursor:pointer; font-size:22px;">⚙️</div>
</div>

<ul id="messages"></ul>

<div class="input-area" id="input-area">
    <div id="reply-bar"><span id="reply-text" style="font-size:13px; color:var(--accent);"></span><span onclick="cancelReply()">✕</span></div>
    
    <div class="input-bar" id="main-input-bar">
        <label for="file" class="icon-btn">📎</label>
        <input type="file" id="file" hidden onchange="sendFile()">
        <span id="mic-btn" class="icon-btn" onclick="toggleMic()">🎤</span>
        <input id="msg" placeholder="رسالة..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <div id="audio-preview-bar">
        <button class="action-btn btn-cancel-audio" onclick="cancelAudio()">🗑️</button>
        <audio id="preview-player" controls class="msg-audio"></audio>
        <button class="action-btn btn-send-audio" onclick="sendPendingAudio()">✅</button>
    </div>
</div>

<div id="settings-modal"><div class="card"><h3>تحديث الخلفية</h3><input id="updateBgInput" placeholder="رابط الصورة المباشر"><button onclick="saveSettings()">تحديث</button><button onclick="closeSettings()" style="background:#3b4a54">إغلاق</button></div></div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const socket = io();
    let currentMe, currentMyRoom, currentMyPass, myReply = null;
    let mediaRecorder, audioChunks = [];
    let pendingAudioBlob = null;

    async function createRoom() {
        const name=document.getElementById("cName").value; const pass=document.getElementById("cPass").value;
        const bg=document.getElementById("cBg").value;
        if(!name || !pass) return alert("أدخل البيانات");
        fetch("/create_room",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name, password:pass, background:bg})}).then(r=>r.json()).then(d=>alert(d.msg));
    }

    function joinRoom() {
        currentMe=document.getElementById("uLogin").value; currentMyRoom=document.getElementById("rLogin").value; currentMyPass=document.getElementById("pLogin").value;
        if(!currentMe || !currentMyRoom) return alert("أكمل بيانات الدخول");
        socket.emit("join", {username: currentMe, room: currentMyRoom, password: currentMyPass});
    }

    socket.on("join_status", d => {
        if(d.status==='success'){
            document.getElementById("login-screen").style.display="none";
            document.getElementById("chat-header").style.display="flex";
            document.getElementById("input-area").style.display="flex";
            if(d.bg) applyBackground(d.bg);
        }
    });

    function applyBackground(url) {
        const m = document.getElementById("messages");
        m.style.background = `url('${url}') no-repeat center center / cover fixed`;
        m.style.backgroundColor = "rgba(11, 20, 26, 0.85)";
    }

    socket.on("message", d => {
        let li = document.createElement("li");
        li.className = "message-item " + (d.username === currentMe ? "my-message" : "other-message");
        let html = `<div style="font-size:10px; color:#ffbc38; font-weight:bold; margin-bottom:4px;">${d.username} <span style="float:left; color:#8696a0;">${d.time}</span></div>`;
        if(d.reply_to) html += `<div style="background:rgba(0,0,0,0.1); border-right:3px solid var(--accent); padding:5px; margin-bottom:5px; font-size:13px; border-radius:4px;">${d.reply_to}</div>`;
        
        if(d.file) {
            if(d.file_type === 'image') {
                html += `<img src="/static/uploads/${d.file}" style="max-width:100%; border-radius:8px; margin-top:8px;">`;
            } else if(d.file_type === 'audio') {
                // الكود الجديد والمصلح للصوت
                html += `<audio controls class="msg-audio"><source src="/static/uploads/${d.file}"></audio>`;
            } else if(d.file_type === 'video') {
                // الكود الجديد والمصلح للفيديو مع playsinline لدعم الجوال
                html += `<video controls playsinline class="msg-video"><source src="/static/uploads/${d.file}"></video>`;
            } else {
                html += `<div style="margin-top:8px; background:rgba(0,0,0,0.1); padding:10px; border-radius:8px;"><a href="/static/uploads/${d.file}" target="_blank" style="color:white; text-decoration:underline;">📎 تحميل الملف</a></div>`;
            }
        }
        
        if(d.msg) html += `<div style="margin-top:5px;">${d.msg}</div>`;
        li.innerHTML = html;
        li.onclick = () => { myReply=d.msg; document.getElementById("reply-bar").style.display="flex"; document.getElementById("reply-text").innerText=d.msg; document.getElementById("msg").focus(); };
        document.getElementById("messages").appendChild(li);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });

    async function toggleMic() {
        const btn = document.getElementById("mic-btn");
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = []; mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = () => {
                pendingAudioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(pendingAudioBlob);
                document.getElementById("preview-player").src = audioUrl;
                document.getElementById("main-input-bar").style.display = "none";
                document.getElementById("audio-preview-bar").style.display = "flex";
                btn.classList.remove("mic-active");
            };
            
            mediaRecorder.start(); btn.classList.add("mic-active");
        } else mediaRecorder.stop();
    }

    async function sendPendingAudio() {
        if(!pendingAudioBlob) return;
        const fileName = `voice_${Date.now()}.webm`;
        let fd = new FormData(); fd.append("chunk", pendingAudioBlob); fd.append("filename", fileName); fd.append("index", 0);
        await fetch("/upload_chunk", { method: "POST", body: fd });
        socket.emit("message", { username: currentMe, room: currentMyRoom, file: fileName, reply_to: myReply });
        cancelAudio(); 
    }

    function cancelAudio() {
        pendingAudioBlob = null; document.getElementById("preview-player").src = "";
        document.getElementById("audio-preview-bar").style.display = "none";
        document.getElementById("main-input-bar").style.display = "flex";
    }

    function sendMessage() {
        const input = document.getElementById("msg");
        if(!input.value.trim() && !myReply) return;
        socket.emit("message", {username: currentMe, room: currentMyRoom, msg: input.value, reply_to: myReply});
        input.value=""; cancelReply();
    }

    async function sendFile() {
        let fileInput = document.getElementById("file"); let f = fileInput.files[0];
        if(!f) return;
        let fd = new FormData(); fd.append("chunk", f); fd.append("filename", f.name); fd.append("index", 0);
        await fetch("/upload_chunk", {method:"POST", body: fd});
        socket.emit("message", {username: currentMe, room: currentMyRoom, file: f.name, reply_to: myReply});
        fileInput.value = "";
    }

    function cancelReply() { myReply=null; document.getElementById("reply-bar").style.display="none"; }
    function openSettings(){ document.getElementById("settings-modal").style.display="flex"; }
    function closeSettings(){ document.getElementById("settings-modal").style.display="none"; }
    function saveSettings(){
        fetch("/update_bg",{method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({room:currentMyRoom, password:currentMyPass, bg_url:document.getElementById("updateBgInput").value})}).then(r=>r.json()).then(d=>{alert(d.msg); closeSettings();});
    }
    socket.on("error_msg", m => alert(m));
    socket.on("update_users", u => document.getElementById("online-list").innerText = "متصل: " + u.join(", "));
    socket.on("bg_updated", url => applyBackground(url));
</script>
</body>
</html>
