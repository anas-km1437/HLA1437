<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anas Chat Pro</title>
    <style>
        body { margin:0; background:#0b141a; color:#e9edef; font-family:Arial; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        
        /* Login */
        #login { position:fixed; inset:0; background:#0b141a; display:flex; justify-content:center; align-items:center; z-index:1000; gap:20px; flex-wrap:wrap; padding:20px; }
        .card { background:#202c33; padding:25px; border-radius:15px; width:300px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input, button { width:100%; padding:12px; margin:8px 0; border:none; border-radius:8px; box-sizing:border-box; outline:none; }
        input { background:#2a3942; color:white; }
        button { background:#00a884; color:white; cursor:pointer; font-weight:bold; transition: 0.2s; }
        button:hover { background:#06cf9c; }

        /* Chat Layout */
        #messages { flex:1; overflow-y:auto; padding:20px; list-style:none; display:flex; flex-direction:column; gap:10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(11, 20, 26, 0.95); background-blend-mode: overlay; }
        .message-item { max-width:75%; padding:8px 12px; border-radius:10px; font-size:15px; position:relative; cursor:pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .my-message { align-self:flex-end; background:#005c4b; border-top-left-radius: 0; }
        .other-message { align-self:flex-start; background:#202c33; border-top-right-radius: 0; }
        
        .meta { font-size:11px; color:#8696a0; display:flex; justify-content:space-between; margin-bottom:4px; gap:15px; }
        .user-label { color:#ffbc38; font-weight:bold; }
        
        /* Reply System */
        .reply-area { background:rgba(0,0,0,0.3); border-right:4px solid #00a884; padding:6px; margin-bottom:6px; border-radius:5px; font-size:13px; color:#cfd5d8; }
        #reply-bar { background:#202c33; padding:12px; display:none; border-bottom:1px solid #2a3942; justify-content:space-between; align-items:center; }
        
        /* Media */
        img, video { max-width:100%; border-radius:10px; margin-top:5px; border: 1px solid #3b4a54; }
        audio { height:40px; width:230px; margin-top:5px; }
        
        /* Input Bar */
        .input-bar { display:flex; gap:12px; padding:10px 15px; background:#202c33; align-items:center; }
        #msg { flex:1; border-radius:25px; padding:12px 18px; background:#2a3942; border:none; color:white; }
        .icon { font-size:24px; cursor:pointer; color:#8696a0; transition: 0.2s; }
        .icon:hover { color:#e9edef; }
        .recording { color:#f44336; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        #send-btn { background:#00a884; width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; padding:0; margin:0; }
    </style>
</head>
<body>

<div id="login">
    <div class="card">
        <h3 style="text-align:center; color:#00a884;">إنشاء غرفة</h3>
        <input id="newRoom" placeholder="اسم الغرفة">
        <input id="newPass" type="password" placeholder="كلمة السر">
        <button onclick="createRoom()">إنشاء غرفة جديدة</button>
    </div>
    <div class="card">
        <h3 style="text-align:center; color:#00a884;">دخول الشات</h3>
        <input id="username" placeholder="اسمك المستعار">
        <input id="room" placeholder="اسم الغرفة">
        <input id="password" type="password" placeholder="كلمة السر">
        <button onclick="joinRoom()">دخول الآن</button>
    </div>
</div>

<ul id="messages"></ul>

<div id="reply-bar">
    <div style="display:flex; flex-direction:column;">
        <span style="font-size:11px; color:#00a884; font-weight:bold;">الرد على:</span>
        <span id="reply-text" style="font-size:13px; color:#8696a0;"></span>
    </div>
    <span onclick="cancelReply()" style="cursor:pointer; font-size:20px;">✕</span>
</div>

<div class="input-bar">
    <label for="file" class="icon">📎</label>
    <input type="file" id="file" hidden onchange="sendFile()">
    <input id="msg" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter')sendMessage()">
    <span id="mic" class="icon" onclick="toggleMic()">🎤</span>
    <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    const socket = io();
    let username = "", currentRoom = "", currentReply = null;
    let mediaRecorder, audioChunks = [];

    function createRoom(){
        const name = document.getElementById("newRoom").value;
        const pass = document.getElementById("newPass").value;
        if(!name || !pass) return alert("يرجى ملء البيانات");
        fetch("/create_room",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name: name, password: pass})
        }).then(r=>r.json()).then(d=>alert(d.msg));
    }

    function joinRoom(){
        username = document.getElementById("username").value;
        currentRoom = document.getElementById("room").value;
        let pass = document.getElementById("password").value;
        if(!username || !currentRoom || !pass) return alert("اكمل بيانات الدخول");
        socket.emit("join", {username, room:currentRoom, password:pass});
    }

    socket.on("join_status", status => {
        if(status==='success') document.getElementById("login").style.display="none";
    });

    socket.on("error_msg", msg => alert(msg));

    function sendMessage(){
        let msgInput = document.getElementById("msg");
        if(!msgInput.value.trim() && !currentReply) return;
        
        socket.emit("message",{
            username, 
            room: currentRoom, 
            msg: msgInput.value, 
            reply_to: currentReply
        });
        msgInput.value="";
        cancelReply();
    }

    socket.on("message", data => {
        let li = document.createElement("li");
        li.className = "message-item " + (data.username === username ? "my-message" : "other-message");
        
        let html = `<div class="meta"><span class="user-label">${data.username}</span><span>${data.time}</span></div>`;
        
        if(data.reply_to) html += `<div class="reply-area">"${data.reply_to}"</div>`;
        
        if(data.file){
            if(data.file_type === 'image') html += `<img src="/static/uploads/${data.file}">`;
            else if(data.file_type === 'video') html += `<video controls src="/static/uploads/${data.file}"></video>`;
            else if(data.file_type === 'audio') html += `<audio controls src="/static/uploads/${data.file}"></audio>`;
        }
        
        if(data.msg) html += `<div>${data.msg}</div>`;
        
        li.innerHTML = html;
        li.onclick = () => setReply(data.msg || "ملف وسائط");
        document.getElementById("messages").appendChild(li);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });

    function setReply(txt){
        currentReply = txt;
        document.getElementById("reply-text").innerText = txt.substring(0, 50) + (txt.length > 50 ? "..." : "");
        document.getElementById("reply-bar").style.display = "flex";
        document.getElementById("msg").focus();
    }

    function cancelReply(){
        currentReply = null;
        document.getElementById("reply-bar").style.display = "none";
    }

    async function sendFile(){
        let file=document.getElementById("file").files[0];
        if(!file) return;
        const chunkSize=1024*512;
        let offset=0, index=0;
        while(offset < file.size){
            let fd = new FormData();
            fd.append("chunk", file.slice(offset, offset + chunkSize));
            fd.append("filename", file.name);
            fd.append("index", index);
            await fetch("/upload_chunk", {method:"POST", body:fd});
            offset += chunkSize; index++;
        }
        socket.emit("message", {username, room:currentRoom, file:file.name});
    }

    async function toggleMic(){
        const micBtn = document.getElementById("mic");
        if(!mediaRecorder || mediaRecorder.state === "inactive"){
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const filename = `voice_${Date.now()}.webm`;
                    
                    let fd = new FormData();
                    fd.append("chunk", blob);
                    fd.append("filename", filename);
                    fd.append("index", 0);
                    await fetch("/upload_chunk", {method:"POST", body:fd});
                    
                    socket.emit("message", {username, room:currentRoom, file:filename});
                };
                mediaRecorder.start();
                micBtn.classList.add("recording");
            } catch(e) { alert("لا يمكن الوصول للميكروفون"); }
        } else {
            mediaRecorder.stop();
            micBtn.classList.remove("recording");
        }
    }
</script>
</body>
</html>
